<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" src="/favicon.svg" />
  <script src="script.js" defer></script>
  <script src="alpinejs@3.15.11.min.js" defer></script>
</head>
<body>
  <div x-data="datetime" class="container">
    <div class="content text-right">
      <div class="date" x-text="date"></div>
      <div class="time" x-text="time"></div>
    </div>
  </div>

  <div x-data="inputsearch" class="container">
    <form @submit.prevent="onSubmit" class="content">
      <input
        type="text"
        placeholder="Search..."
        x-init="$el.focus()"
        x-model="search"
        @keydown="onKeydown"
        @input="index = -1"
      />
      <template x-if="search">
        <ul class="unstyled">
          <template x-for="item, i in historyFiltered">
            <li :class="{ 'selected': i === index }" x-text="item.content"></li>
          </template>
        </ul>
      </template>
    </form>
  </div>
</body>
</html>
